  <rect x="40" y="110" width="180" height="100" rx="18" fill="#fff" stroke="#2f261c" stroke-width="3"/>
  <rect x="285" y="110" width="180" height="100" rx="18" fill="#fff" stroke="#2f261c" stroke-width="3"/>
  <rect x="530" y="60" width="180" height="80" rx="18" fill="#fff" stroke="#2f261c" stroke-width="3"/>
  <rect x="530" y="180" width="180" height="80" rx="18" fill="#fff" stroke="#2f261c" stroke-width="3"/>
  <rect x="775" y="110" width="140" height="100" rx="18" fill="#fff" stroke="#2f261c" stroke-width="3"/>
  <text x="130" y="155" font-size="30" text-anchor="middle" fill="#2f261c" font-family="Georgia, serif">Image</text>
  <text x="130" y="190" font-size="22" text-anchor="middle" fill="#6b5a46" font-family="Georgia, serif">Feature Map</text>
