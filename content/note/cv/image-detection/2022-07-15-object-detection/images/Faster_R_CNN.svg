  <path d="M220 160H285" fill="none" stroke="#2f261c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M465 160H530" fill="none" stroke="#2f261c" stroke-width="4" marker-end="url(#arrow)"/>
