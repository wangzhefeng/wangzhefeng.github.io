<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Conv1d kernel size 2</title>
  <desc id="desc">核大小为2时，相邻两个元素与权重相乘并求和，输出长度缩短。</desc>
  <style>
    .bg{fill:#fffdf8}.panel{fill:#fff;stroke:#e4d7c8;stroke-width:2;rx:24}
    .label{font:700 24px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#1d1a17}
    .text{font:600 18px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#4d463f}
    .num{font:700 24px ui-monospace,Menlo,Consolas,monospace;fill:#0f4a74}
    .cell{fill:#f9f5ee;stroke:#ccbda8;stroke-width:2;rx:12}
    .active{fill:#fde6b9;stroke:#d5852f;stroke-width:3}
    .arrow{stroke:#8d8274;stroke-width:3;marker-end:url(#m)}
  </style>
  <defs><marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8d8274"/></marker></defs>
  <rect class="bg" width="1200" height="400" rx="28"/><rect class="panel" x="18" y="18" width="1164" height="364" rx="28"/>
  <text class="label" x="60" y="60">输入向量</text><text class="label" x="820" y="60">输出向量</text>
  <g transform="translate(54 120)">
    <rect class="cell active" x="0" y="0" width="96" height="72"/><text class="num" x="48" y="46" text-anchor="middle">1</text>
    <rect class="cell active" x="106" y="0" width="96" height="72"/><text class="num" x="154" y="46" text-anchor="middle">2</text>
    <rect class="cell" x="212" y="0" width="96" height="72"/><text class="num" x="260" y="46" text-anchor="middle">3</text>
    <rect class="cell" x="318" y="0" width="96" height="72"/><text class="num" x="366" y="46" text-anchor="middle">4</text>
    <rect class="cell" x="424" y="0" width="96" height="72"/><text class="num" x="472" y="46" text-anchor="middle">5</text>
    <rect class="cell" x="530" y="0" width="96" height="72"/><text class="num" x="578" y="46" text-anchor="middle">6</text>
  </g>
  <text class="text" x="365" y="240" text-anchor="middle">第一步：1×2 + 2×2 = 6</text>
  <line class="arrow" x1="364" y1="254" x2="820" y2="160"/>
  <g transform="translate(822 120)">
    <rect class="cell" x="0" y="0" width="90" height="72"/><text class="num" x="45" y="46" text-anchor="middle">6</text>
    <rect class="cell" x="100" y="0" width="90" height="72"/><text class="num" x="145" y="46" text-anchor="middle">10</text>
    <rect class="cell" x="200" y="0" width="90" height="72"/><text class="num" x="245" y="46" text-anchor="middle">14</text>
    <rect class="cell" x="300" y="0" width="90" height="72"/><text class="num" x="345" y="46" text-anchor="middle">18</text>
    <rect class="cell" x="400" y="0" width="90" height="72"/><text class="num" x="445" y="46" text-anchor="middle">22</text>
  </g>
  <text class="text" x="600" y="332" text-anchor="middle">窗口大小 2，逐步滑动并把相邻元素与权重求和，因此输出长度从 6 变为 5。</text>
</svg>
