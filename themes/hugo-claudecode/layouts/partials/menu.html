<nav class="site-nav" aria-label="主导航">
  <ul class="site-nav__list">
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
      {{ $active := false }}
      {{ if eq .URL "/" }}
        {{ $active = $currentPage.IsHome }}
      {{ else if hasPrefix $currentPage.RelPermalink .URL }}
        {{ $active = true }}
      {{ end }}
      <li class="site-nav__item{{ if $active }} is-active{{ end }}">
        <a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
    {{ end }}
  </ul>
</nav>
